<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta
			name="viewport"
			content="width=device-width, initial-scale=1.0"
		/>
		<style>
			body {
				font-family: Arial, Helvetica, sans-serif;
				display: grid;
				grid-template-columns: repeat(5, 1fr);
				gap: 1rem;
				place-items: center;
				min-height: 100vh;
				margin: 0;
				background-color: #f0f0f0;
			}
			a {
				font-size: 2.5rem;
				font-weight: bold;
				text-decoration: none;
				color: white;
				background-color: darkslategrey;
				padding: 5rem;
				border-radius: 1rem;
				transition: background-color 0.1s ease;
			}
			a:hover {
				background-color: slategrey;
			}

			.disabled {
				background-color: gray;
				pointer-events: none;
				user-select: none;
			}

			@media (max-width: 1150px) {
				body {
					grid-template-columns: repeat(4, 1fr);
				}
			}
			@media (max-width: 900px) {
				body {
					grid-template-columns: repeat(3, 1fr);
				}
			}
			@media (max-width: 700px) {
				body {
					grid-template-columns: repeat(2, 1fr);
				}
			}
			@media (max-width: 500px) {
				body {
					grid-template-columns: 1fr;
				}
			}
		</style>
		<title>Module A Mini Speed Test Projects</title>
	</head>
	<body>
		<a href="/a1">A1</a>
		<a href="/a2">A2</a>
		<a href="/a3">A3</a>
		<a href="/a4">A4</a>
		<a href="/a5">A5</a>
		<a href="/b1">B1</a>
		<a href="/b2">B2</a>
		<a href="/b3">B3</a>
		<a href="/b4">B4</a>
		<a href="/b5">B5</a>
		<a href="/c1/index.js">C1</a>
		<a href="/c2/index.js">C2</a>
		<a href="/c3/index.js">C3</a>
		<a
			href="/c4/index.js"
			class="disabled"
			>C4</a
		>
		<a
			href="/c5/index.js"
			class="disabled"
			>C5</a
		>
	</body>
</html>
